name: Validate runner image
on:
  workflow_dispatch:

jobs:
  Validate:
    runs-on: arc-runner-set

    env:
      TF_VAR_github_app_id: ${{ secrets.APP_ID  }}
      TF_VAR_github_app_intallation_id: ${{ secrets.APP_INSTALLATION_ID  }}
      TF_VAR_ssh_public_key: ${{  secrets.SSH_PUBLIC_KEY  }}
    steps:
    - run: |
        aws --version
        docker --version
        helm version
        terraform version